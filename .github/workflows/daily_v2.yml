name: ADX Score Daily v2

on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & Calculate ADX Score (v1 + v3)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python scripts/fetch_and_calc_v2.py

      - name: Generate Weekly CSV (Fri only)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "5" ]; then
            echo "金曜: weekly_csv_fetch.py 実行"
            python scripts/weekly_csv_fetch.py
          else
            echo "平日($DAY): 週次CSVスキップ"
          fi

      - name: Generate HTML Report
        run: python scripts/generate_html.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json docs/index.html
          git add data/adx_weekly.csv 2>/dev/null || true
          git add data/adx_weekly_xau.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: daily ADX score update $(date +'%Y-%m-%d')"
          git push

      - name: Send LINE Notification (v3 + v1 carousel)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          PAGES_URL:                 ${{ secrets.PAGES_URL }}
        run: python scripts/send_line_v2.py
