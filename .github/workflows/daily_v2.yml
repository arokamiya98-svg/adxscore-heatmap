name: ADX Score Daily v2

on:
  schedule:
    # 毎日 21:00 UTC = 翌朝 06:00 JST（ロンドンクローズ後）
    - cron: "0 21 * * 1-5"   # 月〜金のみ
  workflow_dispatch:          # 手動実行ボタン

permissions:
  contents: write   # data/scores.json と docs/index.html をコミット

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── v1 + v3 スコア計算（日次）──
      - name: Fetch & Calculate ADX Score (v1 + v3)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python scripts/fetch_and_calc_v2.py

      # ── HTML レポート生成 ──
      - name: Generate HTML Report
        run: python scripts/generate_html.py

      # ── コミット & プッシュ ──
      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json data/adx_weekly.csv docs/index.html
          git diff --cached --quiet || git commit -m "chore: daily ADX score update $(date +'%Y-%m-%d')"
          git push

      # ── LINE 2ページ配信 ──
      - name: Send LINE Notification (v3 + v1 carousel)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          PAGES_URL:                 ${{ secrets.PAGES_URL }}
        run: python scripts/send_line_v2.py
