name: ADX Score Weekly Tier

on:
  schedule:
    # 毎週金曜 22:00 UTC = 土曜 07:00 JST（daily完了の1時間後）
    - cron: "0 22 * * 5"
  workflow_dispatch:   # 手動実行ボタン

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git pull --rebase のために履歴が必要

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── D1込みスコア計算（TIER付き）──
      - name: Fetch & Calculate ADX Score (H1 + H4 + D1 + Tier)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python scripts/fetch_and_calc_v2.py

      # ── HTML レポート生成 ──
      - name: Generate HTML Report
        run: python scripts/generate_html.py

      # ── コミット & プッシュ（daily が先に push している場合は rebase）──
      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/scores.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: weekly tier update $(date +'%Y-%m-%d')"
          git push

      # ── 週次 LINE 配信（TIERカード + 週次サマリー）──
      - name: Send LINE Weekly Tier Notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          PAGES_URL:                 ${{ secrets.GITHUB_PAGES_URL }}
        run: python scripts/send_line_weekly.py
